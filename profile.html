<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: #333;
    }
    .container {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #0072ff;
    }
    h2 {
      margin: 15px 0 5px;
      font-size: 1.8rem;
      color: #222;
    }
    p {
      margin: 5px 0;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #0072ff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #0056c7;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.pravatar.cc/150?img=3" alt="Profile Picture" class="profile-pic">
    <h2>John Doe</h2>
    <p>Web Developer 🌐</p>
    <p>📍 Kerala, India</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
